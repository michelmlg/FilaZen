version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: filazen_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - filazen_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: filazen_backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3000}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      MIGRATION_SECRET: ${MIGRATION_SECRET}
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - filazen_network
    command: >
      sh -c "
        if [ \"$$NODE_ENV\" = 'production' ]; then
          echo 'Modo produção: Instalando dependências e compilando backend...' &&
          npm install &&
          npm run build &&
          npm run db:migrate:prod &&
          echo 'Build concluído. Iniciando servidor...' &&
          exec node dist/server.js;
        else
          npm install &&
          npm run dev;
        fi
      "

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: filazen_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000}
      VITE_API_PREFIX: ${VITE_API_PREFIX:-/api/v1}
      VITE_WS_URL: ${VITE_WS_URL:-http://localhost:3000}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - filazen_network
    command: >
      sh -c "
        if [ \"$$NODE_ENV\" = 'production' ]; then
          echo 'Modo produção: Instalando dependências e compilando frontend...' &&
          npm install &&
          npm run build &&
          echo 'Build concluído. Iniciando preview server...' &&
          npx serve -s dist -l 5173;
        else
          npm install &&
          npm run dev -- --host 0.0.0.0;
        fi
      "

volumes:
  postgres_data:

networks:
  filazen_network:
    driver: bridge
