version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: filazen_postgres_prd
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data_prd:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - filazen_network_prd
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: filazen_backend_prd
    restart: always
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3000}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      MIGRATION_SECRET: ${MIGRATION_SECRET}
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - filazen_network_prd

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: filazen_frontend_prd
    restart: always
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000}
      VITE_API_PREFIX: ${VITE_API_PREFIX:-/api/v1}
      VITE_WS_URL: ${VITE_WS_URL:-http://localhost:3000}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend
    networks:
      - filazen_network_prd

volumes:
  postgres_data_prd:

networks:
  filazen_network_prd:
    driver: bridge
